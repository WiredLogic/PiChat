<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PiChat Client</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1, h2 {
            margin-bottom: 0.5rem;
        }

        form {
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #ccc;
        }

        label {
            display: block;
            margin-top: 0.75rem;
            margin-bottom: 0.25rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            box-sizing: border-box;
        }

        button {
            margin-top: 1rem;
            margin-right: 0.5rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

        .status {
            margin: 1rem 0;
            padding: 0.75rem;
            background: #f4f4f4;
            border-left: 4px solid #888;
        }

        ul {
            padding-left: 1.2rem;
        }

        li {
            margin-bottom: 0.4rem;
        }

        .message-box {
            border: 1px solid #ccc;
            padding: 1rem;
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/chat.css}">
</head>
<body>
    <h1>PiChat Client</h1>

    <div class="status" th:text="${statusMessage}">Status appears here.</div>

    <form th:action="@{/send}" th:object="${messageForm}" method="post">
        <h2>Send Message</h2>

        <label for="serverUrl">Server URL</label>
        <input id="serverUrl" type="text" th:field="*{serverUrl}" placeholder="http://192.168.1.50:45123" />

        <label for="senderName">Sender Name</label>
        <input id="senderName" type="text" th:field="*{senderName}" placeholder="alice" />

        <label for="content">Message</label>
        <input id="content" type="text" th:field="*{content}" placeholder="Type your message" />

        <button type="submit">Send</button>
    </form>

    <form th:action="@{/refresh}" th:object="${messageForm}" method="post">
        <input type="hidden" th:field="*{serverUrl}" />
        <input type="hidden" th:field="*{senderName}" />
        <button type="submit">Refresh</button>
    </form>

    <div class="chat-box" id="chatBox"></div>
</div>
    </div>
</body>
</html>

<script>
    const chatBox = document.getElementById("chatBox");

    function getServerUrl() {
        return document.getElementById("serverUrl").value;
    }

    function getSenderName() {
        return document.getElementById("senderName").value;
    }

    function renderMessages(messages) {
        chatBox.innerHTML = "";

        messages.forEach(msg => {
            const row = document.createElement("div");

            const isMine = msg.senderName === getSenderName();

            row.className = isMine ? "chat-row mine" : "chat-row theirs";

            const bubble = document.createElement("div");
            bubble.className = isMine ? "chat-message mine-message" : "chat-message their-message";

            const meta = document.createElement("div");
            meta.className = "chat-meta";
            meta.textContent = `${msg.senderName} | ${msg.senderIp} | ${msg.timestamp}`;

            const content = document.createElement("div");
            content.textContent = msg.content;

            bubble.appendChild(meta);
            bubble.appendChild(content);
            row.appendChild(bubble);

            chatBox.appendChild(row);
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function fetchMessages() {
        const serverUrl = encodeURIComponent(getServerUrl());

        try {
            const response = await fetch(`/api/messages?serverUrl=${serverUrl}`);
            const data = await response.json();
            renderMessages(data);
        } catch (e) {
            console.error("Failed to fetch messages", e);
        }
    }

    // Poll every 2 seconds
    setInterval(fetchMessages, 2000);

    // Initial load
    fetchMessages();
</script>
